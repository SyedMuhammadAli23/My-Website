<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Muhammad Ali — DevOps</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --card: #111827;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: rgba(148,163,184,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -120px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px 48px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.25);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 28px;
      animation: rise 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      animation: rise 0.7s 0.15s cubic-bezier(.22,1,.36,1) both;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      margin-bottom: 40px;
      animation: rise 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    .info-item:nth-child(1) { animation-delay: 0.25s; }
    .info-item:nth-child(2) { animation-delay: 0.32s; }
    .info-item:nth-child(3) { animation-delay: 0.39s; }

    .icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .info-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 14.5px;
      color: var(--text);
      font-weight: 400;
    }
    .info-value a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .info-value a:hover { color: var(--accent); }

    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      animation: rise 0.7s 0.45s cubic-bezier(.22,1,.36,1) both;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DevOps Project</div>

    <h1>Welcome, I'm<br><span>Muhammad Ali</span></h1>
    <p class="subtitle">Building reliable systems, one pipeline at a time.</p>

    <div class="divider"></div>

    <div class="info-list">
      <div class="info-item">
        <div class="icon">✉️</div>
        <div>
          <div class="info-label">Contact</div>
          <div class="info-value">
            <a href="mailto:muhammadali16032003@gmail.com">muhammadali@gmail.com</a>
          </div>
        </div>
      </div>
      <div class="info-item">
        <div class="icon">🎓</div>
        <div>
          <div class="info-label">University</div>
          <div class="info-value">University of Central Punjab</div>
        </div>
      </div>
      <div class="info-item">
        <div class="icon">⚙️</div>
        <div>
          <div class="info-label">Focus</div>
          <div class="info-value">DevOps · CI/CD · Cloud Infrastructure</div>
        </div>
      </div>
    </div>

    <div class="footer">Static site • Hosted with ❤️</div>
  </div>
</body>
</html>
